<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Foto Player</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <h1 class="page-title">Digital Foto Arcika</h1>

    <div class="device">
        <!-- Screws -->
        <div class="screw top-left"></div>
        <div class="screw top-right"></div>
        <div class="screw bottom-left"></div>
        <div class="screw bottom-right"></div>

        <!-- Title -->
        <div class="device-title">ROLATE-FOTO</div>

        <!-- Photo Viewer -->
        <div class="screen-bezel">
            <div class="screen-glass">
                <div class="photo-track" id="photoTrack">
                    <!-- Photos will be inserted via CSS/JS or hardcoded here -->
                    <div class="photo photo-1">
                        <img src="image/1.jpeg" alt="Photo 1">
                    </div>
                    <div class="photo photo-2">
                        <img src="image/2.jpeg" alt="Photo 2">
                    </div>
                    <div class="photo photo-3">
                        <img src="image/3.jpeg" alt="Photo 3">
                    </div>
                    <div class="photo photo-4">
                        <img src="image/4.jpeg" alt="Photo 4">
                    </div>
                    <div class="photo photo-5">
                       <img src="image/5.jpeg" alt="Photo 5">
                    </div>
                    <div class="photo photo-6">
                        <img src="image/6.jpeg" alt="Photo 6">
                    </div>
                    <div class="photo photo-7">
                        <img src="image/7.jpeg" alt="Photo 7">
                    </div>
                    <div class="photo photo-8">
                        <img src="image/8.jpeg" alt="Photo 8">
                    </div>
                    <div class="photo photo-9">
                        <img src="image/9.jpeg" alt="Photo 9">
                    </div>
                    <div class="photo photo-10">
                        <img src="image/10.jpeg" alt="Photo 10">
                    </div>
                    <div class="photo photo-11">
                        <img src="image/11.jpeg" alt="Photo 11">
                    </div>
                    <div class="photo photo-12">
                        <img src="image/12.jpeg" alt="Photo 12">
                    </div>
                    <div class="photo photo-13">
                        <img src="image/13.jpeg" alt="Photo 13">
                    </div>
                    <div class="photo photo-14">
                        <img src="image/14.jpeg" alt="Photo 14">
                    </div>
                </div>
            </div>
        </div>

        <!-- Dots -->
        <div class="dots-container" id="dotsContainer">
            <!-- Generate dots -- JS can do it, or hardcode -->
        </div>

        <!-- Timers -->
        <div class="timers">
            <span id="currentTime">0:00</span>
            <span id="totalTime">1:13</span>
        </div>

        <!-- Knob -->
        <div class="knob-container">
            <div class="knob-base"></div>
            <div class="knob" id="knob">
                <div class="knob-stick"></div>
                <div class="knob-head"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
